<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="toolbar">
        <div class="toolbar-group">
          <button class="tool-btn" data-tool="select" title="选择">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-dasharray="5,5"
            >
              <rect x="4" y="4" width="16" height="16" rx="2" />
            </svg>
          </button>
          <button class="tool-btn" data-tool="shape" title="图形">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="8" cy="8" r="4" />
              <rect x="12" y="12" width="8" height="8" />
            </svg>
          </button>
          <button class="tool-btn" data-tool="image" title="图片">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <path d="M4 18 L8 10 L12 14 L16 8 L20 18 Z" fill="currentColor" />
            </svg>
          </button>
          <button class="tool-btn" data-tool="text" title="文本">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <line x1="8" y1="8" x2="16" y2="8" />
              <line x1="12" y1="8" x2="12" y2="16" />
            </svg>
          </button>
          <button class="tool-btn" data-tool="pen" title="画笔">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 20h9" />
              <path
                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
          </button>
          <button class="tool-btn" data-tool="file" title="文件">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
          </button>
        </div>
      </header>

      <div class="main-area">
        <aside class="properties-panel" id="propertiesPanel">
          <div class="panel-content">
            <!-- 形状侧边栏内容 -->
            <div class="sidebar-content" id="shapeSidebar">
              <div class="sidebar-header">
                <div class="section-title">图形</div>
                <button class="close-sidebar-btn" data-sidebar="shapeSidebar">
                  ×
                </button>
              </div>
              <!-- 形状选择 -->
              <div class="property-section">
                <div class="section-title">形状</div>
                <div class="shape-grid">
                  <button class="shape-item active" data-shape="line">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                  </button>
                  <button class="shape-item" data-shape="rect">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <rect x="5" y="5" width="14" height="14" />
                    </svg>
                  </button>
                  <button class="shape-item" data-shape="circle">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <circle cx="12" cy="12" r="7" />
                    </svg>
                  </button>
                  <button class="shape-item" data-shape="ellipse">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <ellipse cx="12" cy="12" rx="8" ry="5" />
                    </svg>
                  </button>
                  <button class="shape-item" data-shape="triangle">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M12 5L5 19h14L12 5z" />
                    </svg>
                  </button>
                </div>
              </div>

              <!-- 颜色选择 -->
              <div class="property-section" id="shapeColorSection">
                <div class="section-title">颜色</div>
                <div class="color-tabs">
                  <button class="color-tab active" data-tab="stroke">
                    边框
                  </button>
                  <button class="color-tab" data-tab="fill">背景</button>
                </div>
                <div class="color-grid" id="shapeColorGrid">
                  <button
                    class="color-item active"
                    data-color="#8B9CAF"
                    style="background-color: #8b9caf"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C4B7A6"
                    style="background-color: #c4b7a6"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A8B5A0"
                    style="background-color: #a8b5a0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#D4C4B0"
                    style="background-color: #d4c4b0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B8A9A0"
                    style="background-color: #b8a9a0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C9B8BC"
                    style="background-color: #c9b8bc"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A9B0A8"
                    style="background-color: #a9b0a8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B5C0C4"
                    style="background-color: #b5c0c4"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C4C0B8"
                    style="background-color: #c4c0b8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B8B5A8"
                    style="background-color: #b8b5a8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A8B0B5"
                    style="background-color: #a8b0b5"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C0B8B0"
                    style="background-color: #c0b8b0"
                  ></button>
                </div>
              </div>

              <!-- 透明度 -->
              <div class="property-section">
                <div class="section-title">透明度</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="opacitySlider"
                    min="0"
                    max="100"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="opacityValue">100%</div>
                </div>
              </div>

              <!-- 边框宽度 -->
              <div class="property-section">
                <div class="section-title">边框宽度</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="borderWidthSlider"
                    min="0"
                    max="20"
                    value="2"
                    class="slider"
                  />
                  <div class="slider-value" id="borderWidthValue">2px</div>
                </div>
              </div>

              <!-- 大小 -->
              <div class="property-section">
                <div class="section-title">大小</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="sizeSlider"
                    min="10"
                    max="200"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="sizeValue">100%</div>
                </div>
              </div>
            </div>

            <!-- 文本侧边栏内容 -->
            <div class="sidebar-content" id="textSidebar">
              <div class="sidebar-header">
                <div class="section-title">文本</div>
                <button class="close-sidebar-btn" data-sidebar="textSidebar">
                  ×
                </button>
              </div>
              <!-- 字体选择 -->
              <div class="property-section">
                <div class="section-title">字体</div>
                <div class="font-selector">
                  <div class="font-display" id="fontDisplay">宋体</div>
                  <div class="font-dropdown" id="fontDropdown">
                    <div class="font-option selected" data-font="宋体">
                      宋体
                    </div>
                    <div class="font-option" data-font="黑体">黑体</div>
                    <div class="font-option" data-font="楷体">楷体</div>
                    <div class="font-option" data-font="微软雅黑">微软雅黑</div>
                    <div class="font-option" data-font="Arial">Arial</div>
                    <div class="font-option" data-font="Times New Roman">
                      Times New Roman
                    </div>
                  </div>
                </div>
              </div>

              <!-- 颜色选择 -->
              <div class="property-section" id="textColorSection">
                <div class="section-title">颜色</div>
                <div class="color-grid" id="textColorGrid">
                  <button
                    class="color-item active"
                    data-color="#9B8B9F"
                    style="background-color: #9b8b9f"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A6B7C4"
                    style="background-color: #a6b7c4"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A0B5A8"
                    style="background-color: #a0b5a8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B0C4B8"
                    style="background-color: #b0c4b8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A9B8B0"
                    style="background-color: #a9b8b0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#BCB8C9"
                    style="background-color: #bcb8c9"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A8B0A0"
                    style="background-color: #a8b0a0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C4B5C0"
                    style="background-color: #c4b5c0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B8C0B5"
                    style="background-color: #b8c0b5"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A8B5B8"
                    style="background-color: #a8b5b8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B0A8B5"
                    style="background-color: #b0a8b5"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B8C0B0"
                    style="background-color: #b8c0b0"
                  ></button>
                </div>
              </div>

              <!-- 透明度 -->
              <div class="property-section">
                <div class="section-title">透明度</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="textOpacitySlider"
                    min="0"
                    max="100"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="textOpacityValue">100%</div>
                </div>
              </div>

              <!-- 大小 -->
              <div class="property-section">
                <div class="section-title">大小</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="textSizeSlider"
                    min="10"
                    max="200"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="textSizeValue">100%</div>
                </div>
              </div>

              <!-- 粗体和斜体 -->
              <div class="property-section">
                <div class="section-title">样式</div>
                <div class="style-buttons">
                  <button class="style-btn" id="boldBtn" title="粗体">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                      <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                    </svg>
                    <span class="style-tooltip">粗体</span>
                  </button>
                  <button class="style-btn" id="italicBtn" title="斜体">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <line x1="19" y1="4" x2="10" y2="4" />
                      <line x1="14" y1="20" x2="5" y2="20" />
                      <line x1="15" y1="4" x2="9" y2="20" />
                    </svg>
                    <span class="style-tooltip">斜体</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- 图片侧边栏内容 -->
            <div class="sidebar-content" id="imageSidebar">
              <div class="sidebar-header">
                <div class="section-title">图片</div>
                <button class="close-sidebar-btn" data-sidebar="imageSidebar">
                  ×
                </button>
              </div>
              <div class="filter-grid">
                <button class="filter-item active" data-filter="none">
                  原图
                </button>
                <button class="filter-item" data-filter="grayscale">
                  灰度
                </button>
                <button class="filter-item" data-filter="brightness">
                  亮度
                </button>
                <button class="filter-item" data-filter="contrast">
                  对比度
                </button>
                <button class="filter-item" data-filter="saturation">
                  饱和度
                </button>
              </div>

              <!-- 大小 -->
              <div class="property-section">
                <div class="section-title">大小</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="imageSizeSlider"
                    min="10"
                    max="200"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="imageSizeValue">100%</div>
                </div>
              </div>

              <!-- 透明度 -->
              <div class="property-section">
                <div class="section-title">透明度</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="imageOpacitySlider"
                    min="0"
                    max="100"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="imageOpacityValue">100%</div>
                </div>
              </div>
            </div>

            <!-- 画笔侧边栏内容 -->
            <div class="sidebar-content" id="penSidebar">
              <div class="sidebar-header">
                <div class="section-title">画笔</div>
                <button class="close-sidebar-btn" data-sidebar="penSidebar">
                  ×
                </button>
              </div>
              <!-- 颜色选择 -->
              <div class="property-section">
                <div class="section-title">颜色</div>
                <div class="color-grid" id="penColorGrid">
                  <button
                    class="color-item active"
                    data-color="#88A8C9"
                    style="background-color: #88a8c9"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A6C4B7"
                    style="background-color: #a6c4b7"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B5A0A8"
                    style="background-color: #b5a0a8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C4B0A0"
                    style="background-color: #c4b0a0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A0B0C4"
                    style="background-color: #a0b0c4"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B8C4B0"
                    style="background-color: #b8c4b0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C4B8B8"
                    style="background-color: #c4b8b8"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B0B5C4"
                    style="background-color: #b0b5c4"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#C0B5A6"
                    style="background-color: #c0b5a6"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#A8B8B0"
                    style="background-color: #a8b8b0"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B5C0B5"
                    style="background-color: #b5c0b5"
                  ></button>
                  <button
                    class="color-item"
                    data-color="#B0A8B8"
                    style="background-color: #b0a8b8"
                  ></button>
                </div>
              </div>

              <!-- 画笔大小 -->
              <div class="property-section">
                <div class="section-title">画笔大小</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="penSizeSlider"
                    min="1"
                    max="50"
                    value="5"
                    class="slider"
                  />
                  <div class="slider-value" id="penSizeValue">5px</div>
                </div>
              </div>

              <!-- 透明度 -->
              <div class="property-section">
                <div class="section-title">透明度</div>
                <div class="slider-container">
                  <input
                    type="range"
                    id="penOpacitySlider"
                    min="0"
                    max="100"
                    value="100"
                    class="slider"
                  />
                  <div class="slider-value" id="penOpacityValue">100%</div>
                </div>
              </div>
            </div>

            <!-- 文件侧边栏内容 -->
            <div class="sidebar-content" id="fileSidebar">
              <div class="sidebar-header">
                <div class="section-title">画布文件</div>
                <button class="close-sidebar-btn" data-sidebar="fileSidebar">
                  ×
                </button>
              </div>
              <div class="file-actions">
                <button class="action-btn" id="newCanvasBtn">新建画布</button>
                <button class="action-btn" id="saveCanvasBtn">保存画布</button>
                <button class="action-btn" id="openCanvasBtn">打开画布</button>
              </div>
            </div>
          </div>
        </aside>

        <main class="canvas-container">
          <canvas id="canvas"></canvas>
        </main>
      </div>
    </div>

    <!-- 文件选择对话框 -->
    <div class="file-dialog" id="fileDialog">
      <div class="dialog-content">
        <h3>选择图片文件</h3>
        <p>请选择 PNG 或 JPEG 格式的图片</p>
        <input type="file" id="fileInput" accept=".png,.jpg,.jpeg" />
        <div class="dialog-actions">
          <button id="cancelBtn">取消</button>
          <button id="confirmBtn">确定</button>
        </div>
      </div>
    </div>

    <!-- 错误提示 -->
    <div class="error-toast" id="errorToast">
      <p>请选择 PNG 或 JPEG 格式的图片</p>
    </div>

    <!-- 画布列表弹窗 -->
    <div class="canvas-list-dialog" id="canvasListDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h3>我的画布</h3>
          <button class="close-btn" id="closeCanvasListBtn">×</button>
        </div>
        <div class="canvas-list" id="canvasList"></div>
      </div>
    </div>

    <!-- 新建画布弹窗 -->
    <div class="new-canvas-dialog" id="newCanvasDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h3>新建画布</h3>
          <button class="close-btn" id="closeNewCanvasBtn">×</button>
        </div>
        <div class="dialog-body">
          <input
            type="text"
            id="canvasNameInput"
            placeholder="请输入画布名称"
          />
        </div>
        <div class="dialog-actions">
          <button id="cancelNewCanvasBtn">取消</button>
          <button id="confirmNewCanvasBtn">创建</button>
        </div>
      </div>
    </div>

    <script src="js/canvas.js" type="module"></script>
    <script src="js/toolbars.js" type="module"></script>
    <script src="js/choose.js" type="module"></script>
    <script src="js/graph.js" type="module"></script>
    <script src="js/pen.js" type="module"></script>
    <script src="js/photo.js" type="module"></script>
    <script src="js/text.js" type="module"></script>
  </body>
</html>
